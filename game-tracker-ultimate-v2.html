<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gamelist</title>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --surface: #0a0a0c;
      --surface-bright: #1c1c1e;
      --text: #ffffff;
      --text-dim: #8e8e93;
      --apple-red: #ff3b30;
      --apple-green: #34c759;
      --apple-blue: #007aff;
      --border: rgba(255, 255, 255, 0.1);
      --radius: 14px;
      --font: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 50px 50px;
      opacity: 0.2;
    }

    .electric-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      pointer-events: none;
      z-index: -1;
    }

    .topbar {
      position: fixed;
      top: 0;
      width: 100%;
      height: 64px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      z-index: 1000;
    }

    .logo {
      font-weight: 800;
      font-size: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo span {
      color: var(--apple-blue);
    }

    .btn-config {
      background: var(--surface-bright);
      border: 1px solid var(--border);
      color: white;
      padding: 8px 16px;
      border-radius: 100px;
      cursor: pointer;
      font-size: 13px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 100px 20px 60px;
    }

    .hero {
      text-align: center;
      margin-bottom: 60px;
    }

    .hero h1 {
      font-size: 64px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
    }

    .hero p {
      color: var(--text-dim);
      margin-top: 15px;
      font-size: 18px;
    }

    .search-wrapper {
      position: relative;
      max-width: 700px;
      margin: 0 auto 40px;
    }

    .search-bar {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px 30px;
      border-radius: 20px;
      color: white;
      font-size: 18px;
      outline: none;
      transition: 0.3s;
    }

    .search-bar:focus {
      border-color: var(--apple-blue);
      box-shadow: 0 0 20px rgba(0, 122, 255, 0.2);
    }

    .suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--surface-bright);
      border-radius: 15px;
      margin-top: 10px;
      border: 1px solid var(--border);
      max-height: 400px;
      overflow-y: auto;
      display: none;
      z-index: 500;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }

    .suggestion-item {
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }

    .suggestion-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .suggestion-item.selected {
      border-left: 4px solid var(--apple-green);
      background: rgba(52, 199, 89, 0.1);
    }

    .multi-add-bar {
      display: none;
      margin-top: 20px;
      background: var(--apple-blue);
      color: white;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      cursor: pointer;
      font-weight: 700;
    }

    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      justify-content: center;
    }

    .filter-btn {
      padding: 10px 20px;
      border-radius: 100px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      transition: 0.3s;
    }

    .filter-btn.active {
      background: white;
      color: black;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 25px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .card:hover {
      transform: translateY(-10px);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .card-header {
      position: relative;
      aspect-ratio: 16/9;
      background: #111;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-status {
      position: absolute;
      top: 15px;
      right: 15px;
      padding: 5px 12px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .status-not-started {
      background: var(--apple-red);
      color: white;
    }

    .status-in-progress {
      background: var(--apple-blue);
      color: white;
    }

    .status-finished {
      background: var(--apple-green);
      color: white;
    }

    .card-body {
      padding: 20px;
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 15px;
    }

    .time-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .time-box {
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      border: 1px solid var(--border);
    }

    .time-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .time-val {
      font-size: 14px;
      font-weight: 700;
    }

    .prices-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .price-val {
      font-size: 13px;
      font-weight: 700;
      color: var(--apple-green);
    }

    .price-val.null {
      color: var(--text-dim);
      font-weight: 400;
    }

    .personal-time {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .time-input {
      width: 60px;
      background: var(--surface-bright);
      border: 1px solid var(--border);
      color: white;
      padding: 5px;
      border-radius: 5px;
      text-align: center;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    .action-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-bright);
      color: white;
      cursor: pointer;
      font-size: 12px;
    }

    .action-btn:hover {
      background: white;
      color: black;
    }

    .btn-delete {
      background: rgba(255, 59, 48, 0.1);
      color: var(--apple-red);
      border-color: rgba(255, 59, 48, 0.2);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 40px;
      border-radius: 25px;
      width: 100%;
      max-width: 500px;
    }

    .modal-input {
      width: 100%;
      background: var(--surface-bright);
      border: 1px solid var(--border);
      padding: 15px;
      border-radius: 12px;
      color: white;
      margin: 20px 0;
      outline: none;
    }

    .loader {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      color: black;
      padding: 12px 30px;
      border-radius: 100px;
      font-weight: 700;
      display: none;
      z-index: 1000;
    }
  </style>
</head>

<body>

  <div class="bg-grid"></div>
  <div class="electric-glow" style="top: -100px; left: -100px; background: var(--apple-blue);"></div>
  <div class="electric-glow" style="bottom: -100px; right: -100px; background: var(--apple-red);"></div>

  <nav class="topbar">
    <div class="logo">gamelist<span>by David</span></div>
    <button class="btn-config" onclick="toggleModal(true)">API Config</button>
  </nav>

  <div class="container">
    <div class="hero">
      <h1>Gamelist</h1>
      <p>manage your games better</p>
    </div>

    <div class="search-wrapper">
      <input type="text" id="searchInput" class="search-bar" placeholder="Cerca un gioco (es. Elden Ring)..."
        oninput="handleSearch(this.value)">
      <div id="suggestions" class="suggestions"></div>
      <div id="multiAddBar" class="multi-add-bar" onclick="addSelectedGames()">Aggiungi Giochi Selezionati (0)</div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">Tutti</button>
      <button class="filter-btn" onclick="setFilter('not-started', this)">Non Iniziati</button>
      <button class="filter-btn" onclick="setFilter('in-progress', this)">In Corso</button>
      <button class="filter-btn" onclick="setFilter('finished', this)">Finiti</button>
    </div>

    <div class="grid" id="gamesGrid"></div>
  </div>

  <div class="modal" id="configModal">
    <div class="modal-content">
      <h2>Groq API Config</h2>
      <p style="color: var(--text-dim); font-size: 14px; margin-top: 10px;">Inserisci la tua chiave Groq per abilitare
        le funzioni AI.</p>
      <input type="password" id="apiKeyInput" class="modal-input" placeholder="gsk_...">
      <button class="btn-config" style="width: 100%; padding: 15px;" onclick="saveApiKey()">Salva Chiave</button>
      <button onclick="toggleModal(false)"
        style="width: 100%; background: none; border: none; color: var(--text-dim); margin-top: 15px; cursor: pointer;">Chiudi</button>
    </div>
  </div>

  <div id="loader" class="loader">Elaborazione AI in corso...</div>

  <script>
    let games = JSON.parse(localStorage.getItem('gv_ultimate_v2_games') || '[]');
    let apiKey = localStorage.getItem('gv_ultimate_apikey') || '';
    let selectedGames = [];
    let currentFilter = 'all';

    document.getElementById('apiKeyInput').value = apiKey;
    render();

    function toggleModal(show) { document.getElementById('configModal').style.display = show ? 'flex' : 'none'; }
    function saveApiKey() {
      apiKey = document.getElementById('apiKeyInput').value.trim();
      localStorage.setItem('gv_ultimate_apikey', apiKey);
      toggleModal(false);
    }

    async function callGroq(prompt) {
      if (!apiKey) { toggleModal(true); throw new Error('API Key mancante'); }
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [{ role: "user", content: prompt }],
          temperature: 0.1,
          response_format: { type: "json_object" }
        })
      });
      const data = await res.json();
      return JSON.parse(data.choices[0].message.content);
    }

    let searchTimeout;
    async function handleSearch(query) {
      if (query.length < 2) { document.getElementById('suggestions').style.display = 'none'; return; }
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(async () => {
        try {
          const prompt = `Ritorna una lista di 6 giochi. Il PRIMO deve essere esattamente "${query}" (se esiste), gli altri 5 devono essere simili. Formato JSON: { "results": [{ "name": "titolo", "year": "anno" }] }`;
          const data = await callGroq(prompt);
          displaySuggestions(data.results);
        } catch (e) { }
      }, 400);
    }

    function displaySuggestions(results) {
      const container = document.getElementById('suggestions');
      container.innerHTML = results.map(res => `
    <div class="suggestion-item ${selectedGames.includes(res.name) ? 'selected' : ''}" onclick="toggleSelection('${res.name}', this)">
      <span>${res.name} (${res.year})</span>
      <span style="color: var(--apple-blue)">${selectedGames.includes(res.name) ? '✓ Selezionato' : '+ Seleziona'}</span>
    </div>
  `).join('');
      container.style.display = 'block';
    }

    function toggleSelection(name, el) {
      const idx = selectedGames.indexOf(name);
      if (idx > -1) {
        selectedGames.splice(idx, 1);
        el.classList.remove('selected');
        el.querySelector('span:last-child').textContent = '+ Seleziona';
      } else {
        selectedGames.push(name);
        el.classList.add('selected');
        el.querySelector('span:last-child').textContent = '✓ Selezionato';
      }
      updateMultiAddBar();
    }

    function updateMultiAddBar() {
      const bar = document.getElementById('multiAddBar');
      if (selectedGames.length > 0) {
        bar.style.display = 'block';
        bar.textContent = `Aggiungi Giochi Selezionati (${selectedGames.length})`;
      } else {
        bar.style.display = 'none';
      }
    }

    async function addSelectedGames() {
      document.getElementById('loader').style.display = 'block';
      for (const name of selectedGames) {
        try {
          const prompt = `Dati per il gioco "${name}" in JSON: { "title": "titolo", "cover": "url immagine reale Steam/IGDB", "mainStory": "ore", "completionist": "ore", "desc": "breve", "prices": { "steam": 0.0, "epic": 0.0, "ps": 0.0 } }`;
          const info = await callGroq(prompt);
          games.unshift({
            id: Date.now() + Math.random(),
            title: info.title,
            cover: info.cover || 'https://via.placeholder.com/400x225',
            mainStory: info.mainStory,
            completionist: info.completionist,
            description: info.desc,
            prices: info.prices || { steam: null, epic: null, ps: null },
            status: 'not-started',
            personalTime: 0
          });
        } catch (e) { }
      }
      selectedGames = [];
      updateMultiAddBar();
      document.getElementById('suggestions').style.display = 'none';
      document.getElementById('searchInput').value = '';
      document.getElementById('loader').style.display = 'none';
      save(); render();
    }

    function render() {
      const grid = document.getElementById('gamesGrid');
      const filtered = currentFilter === 'all' ? games : games.filter(g => g.status === currentFilter);

      grid.innerHTML = filtered.map(g => `
    <div class="card">
      <div class="card-header">
        <img src="${g.cover}" class="card-img" onerror="this.src='https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800'">
        <div class="card-status status-${g.status}">${g.status.replace('-', ' ')}</div>
      </div>
      <div class="card-body">
        <div class="card-title">${g.title}</div>
        
        <div class="time-info">
          <div class="time-box">
            <div class="time-label">Storia</div>
            <div class="time-val">${g.mainStory}h</div>
          </div>
          <div class="time-box">
            <div class="time-label">100%</div>
            <div class="time-val">${g.completionist}h</div>
          </div>
        </div>

        <div style="font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px;">Prezzi Live</div>
        <div class="prices-grid">
          <div class="price-row">
            <span style="font-size: 12px;">Steam</span>
            <span class="price-val ${g.prices?.steam === null ? 'null' : ''}">${g.prices?.steam ? '€' + g.prices.steam : 'N/D'}</span>
          </div>
          <div class="price-row">
            <span style="font-size: 12px;">Epic</span>
            <span class="price-val ${g.prices?.epic === null ? 'null' : ''}">${g.prices?.epic ? '€' + g.prices.epic : 'N/D'}</span>
          </div>
          <div class="price-row">
            <span style="font-size: 12px;">PS Store</span>
            <span class="price-val ${g.prices?.ps === null ? 'null' : ''}">${g.prices?.ps ? '€' + g.prices.ps : 'N/D'}</span>
          </div>
        </div>
        
        ${g.status === 'finished' ? `
          <div class="personal-time">
            <span style="font-size: 12px; font-weight: 600;">Il tuo tempo:</span>
            <div>
              <input type="number" class="time-input" value="${g.personalTime}" onchange="updatePersonalTime(${g.id}, this.value)"> ore
            </div>
          </div>
        ` : ''}

        <div class="card-actions">
          <button class="action-btn" onclick="setStatus(${g.id}, 'not-started')">Non Iniziato</button>
          <button class="action-btn" onclick="setStatus(${g.id}, 'in-progress')">In Corso</button>
          <button class="action-btn" onclick="setStatus(${g.id}, 'finished')">Finito</button>
        </div>
        <button class="action-btn btn-delete" style="width: 100%; margin-top: 10px;" onclick="deleteGame(${g.id})">Rimuovi</button>
      </div>
    </div>
  `).join('');
    }

    function setStatus(id, s) {
      const g = games.find(x => x.id === id);
      if (g) { g.status = s; save(); render(); }
    }

    function updatePersonalTime(id, val) {
      const g = games.find(x => x.id === id);
      if (g) { g.personalTime = val; save(); }
    }

    function deleteGame(id) {
      games = games.filter(x => x.id !== id);
      save(); render();
    }

    function setFilter(f, el) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    function save() { localStorage.setItem('gv_ultimate_v2_games', JSON.stringify(games)); }
  </script>
</body>

</html>
